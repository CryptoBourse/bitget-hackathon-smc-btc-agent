name: smc-btc-agent-m15
display_name: "SMC BTC Agent M15"
version: "0.2.0"
description: "Autonomous SMC trading agent on BTC perpetual M15 with volatility perception and liquidity sweep execution"
long_description: |
  This Playbook is an autonomous trading agent for BTC perpetual futures on an
  intraday timeframe. The thesis is that BTC frequently captures resting
  liquidity beyond swing extremes before reversing, and an agent can perceive
  that behavior and act without discretionary chart reading. The agent is built
  around a simple but complete perceive-decide-execute loop rather than a
  single static indicator rule. It first reads
  whether the market is active enough to trade, then maps swing structure and
  liquidity behavior, and only then commits to a directional position with
  predefined risk controls.

  Perception combines two layers. A volatility regime read filters out quiet
  periods where liquidity sweeps are usually noise rather than genuine stop
  runs. A structure read tracks confirmed swing highs and lows so the agent
  knows whether price is interacting with premium, discount, or a neutral zone
  before it considers a reversal setup.

  Decision logic follows Smart Money Concepts. The agent waits for a sweep
  beyond a recent swing extreme and a close back inside the prior range,
  signaling that resting liquidity was taken rather than that a true breakout
  has started. It then looks for a change of character and a retest of the
  last opposing order block while price remains in a favorable value area.
  Only when perception, liquidity, and value alignment agree does it enter
  long or enter short.

  Execution is fully rule-based once the setup is valid. The agent places the
  position through the Playbook runtime, defines stop loss beyond the sweep
  extreme, targets a reward multiple of the initial risk, and closes early if
  market structure flips against the open trade. Subscribers can tune how
  aggressively sweeps are detected, how far the agent searches for order
  blocks, the reward multiple, volatility sensitivity, position size, leverage,
  and margin budget.

  The strategy underperforms in very quiet sessions where volatility never
  reaches the active regime threshold, and in violent news spikes where a valid
  sweep is immediately invalidated before the retest can complete. Choppy
  overlapping ranges can also create repeated false sweeps and whipsaw losses.
  Past historical backtest performance is not a guarantee of live profitability,
  and paper or live execution will face slippage and fees that erode edge.

market_type: contract
trading_symbols: ["BTCUSDT"]
tags: ["smc", "btc", "agent", "autonomous", "liquidity", "m15", "contract"]

decision_mode: deterministic
backtest_support: full
runtime_profile: deterministic
execution_mode: follow_trade
follow_trade_supported: true

schedule:
  cron: "*/15 * * * *"
  tz: "Asia/Shanghai"

strategy_config:
  trading_symbols: ["BTCUSDT"]
  bar_interval: "15m"
  swing_lookback: 6
  sweep_buffer_pct: 0.0008
  ob_search_bars: 6
  rr_ratio: 2.5
  max_bars_after_sweep: 8
  atr_period: 14
  min_atr_pct: 0.0018
  max_atr_pct: 0.0
  leverage: 3
  margin_budget: "200"
  trade_size: "0.01"

user_config_schema:
  trading_symbols:
    type: array
    item_type: string
    default: ["BTCUSDT"]
    options: ["BTCUSDT", "ETHUSDT", "SOLUSDT"]
    aliases:
      btc: BTCUSDT
      bitcoin: BTCUSDT
      eth: ETHUSDT
    min_items: 1
    max_items: 1
    label: "Trading symbol"
  leverage:
    type: integer
    default: 3
    min: 1
    max: 20
    label: "Leverage"
  margin_budget:
    type: string
    default: "200"
    pattern: "^[0-9]+(\\.[0-9]+)?$"
    label: "Margin budget USDT"
  rr_ratio:
    type: number
    default: 2.5
    min: 1.0
    max: 4.0
    label: "Reward to risk multiple"
  min_atr_pct:
    type: number
    default: 0.0018
    min: 0.0005
    max: 0.005
    label: "Minimum volatility to trade"
  swing_lookback:
    type: integer
    default: 6
    min: 3
    max: 12
    label: "Swing structure lookback"