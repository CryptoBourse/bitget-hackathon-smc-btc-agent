name: smc-btc-agent-m15
display_name: "Gold SMC Agent M15"
version: "0.2.3"
description: |
  This Playbook trades tokenized gold perpetual futures using Smart Money Concepts on a medium-term intraday timeframe. The thesis is that gold frequently hunts resting liquidity beyond obvious swing extremes before reversing toward institutional order blocks. Rather than chasing breakouts blindly, the strategy waits for a liquidity sweep, a shift in market structure, and a disciplined retest inside a favorable value zone before committing capital. It is built for subscribers who want a rules-based SMC workflow instead of discretionary chart reading.

  Entries begin after price sweeps a recent swing extreme and closes back inside the prior range, signaling a stop-run rather than a true breakout. The Playbook then looks for a change of character in the direction of the intended reversal and waits for price to retest the last opposing order block while price remains in discount for longs or premium for shorts. Only when structure, liquidity, and value alignment agree does it enter long or enter short with a directional position.

  Exits are managed with a fixed reward-to-risk framework plus structural invalidation. If price violates the sweep extreme again, the trade is closed as a failed setup. If price reaches the projected target derived from the initial risk budget, the position is closed to bank gains. An additional structure-based exit closes the trade when market character flips against the open position, preventing a winner from turning into a full reversal loss.

  Subscribers may tune how aggressively the model labels liquidity sweeps, how far it searches for order blocks, the reward multiple applied to each setup, position size, leverage, and margin budget. Tighter sweep sensitivity produces fewer but cleaner signals, while wider sensitivity increases trade count at the cost of noisier entries. A higher reward multiple stretches profit targets and can reduce hit rate, while a lower multiple banks gains sooner.

  The same SMC framework has been backtested on Bitcoin, Ethereum, and Solana perpetual futures in addition to tokenized gold. Subscribers choose one active pair at a time via Custom configuration.

  The strategy underperforms in low-volatility sessions where sweeps are shallow and order blocks are repeatedly violated without follow-through. Fast news-driven spikes around macro releases can also stop out valid structural setups before the retest completes. Choppy overlapping ranges on gold can create repeated false sweeps and whipsaw losses. Past backtest performance is not a guarantee of live profitability.
long_description: |
  This Playbook trades tokenized gold perpetual futures using Smart Money
  Concepts on a medium-term intraday timeframe. The thesis is that gold
  frequently hunts resting liquidity beyond obvious swing extremes before
  reversing toward institutional order blocks. Rather than chasing breakouts
  blindly, the strategy waits for a liquidity sweep, a shift in market
  structure, and a disciplined retest inside a favorable value zone before
  committing capital. It is built for subscribers who want a rules-based SMC
  workflow instead of discretionary chart reading.

  Entries begin after price sweeps a recent swing extreme and closes back
  inside the prior range, signaling a stop-run rather than a true breakout.
  The Playbook then looks for a change of character in the direction of the
  intended reversal and waits for price to retest the last opposing order
  block while price remains in discount for longs or premium for shorts. Only
  when structure, liquidity, and value alignment agree does it enter long or
  enter short with a directional position.

  Exits are managed with a fixed reward-to-risk framework plus structural
  invalidation. If price violates the sweep extreme again, the trade is
  closed as a failed setup. If price reaches the projected target derived
  from the initial risk budget, the position is closed to bank gains. An
  additional structure-based exit closes the trade when market character
  flips against the open position, preventing a winner from turning into a
  full reversal loss.

  Subscribers may tune how aggressively the model labels liquidity sweeps,
  how far it searches for order blocks, the reward multiple applied to each
  setup, position size, leverage, and margin budget. Tighter sweep
  sensitivity produces fewer but cleaner signals, while wider sensitivity
  increases trade count at the cost of noisier entries. A higher reward
  multiple stretches profit targets and can reduce hit rate, while a lower
  multiple banks gains sooner.

  Multi-asset validation: the same SMC framework has been backtested on
  Bitcoin, Ethereum, and Solana perpetual futures in addition to
  tokenized gold. Reproducible local grid-search and extended-history
  scripts confirm the logic produces trades across all four markets.
  Subscribers choose one active pair at a time via Custom configuration.

  The strategy underperforms in low-volatility sessions where sweeps are
  shallow and order blocks are repeatedly violated without follow-through.
  Fast news-driven spikes around macro releases can also stop out valid
  structural setups before the retest completes. Choppy overlapping ranges
  on gold can create repeated false sweeps and whipsaw losses. Past
  backtest performance is not a guarantee of live profitability, and paper
  or live execution will face slippage and fees that erode edge.

market_type: contract
trading_symbols: ["BTCUSDT"]
tags: ["smc", "gold", "btc", "eth", "sol", "agent", "autonomous", "liquidity", "m15", "contract", "multi-asset", "hackathon"]

decision_mode: deterministic
backtest_support: full
runtime_profile: deterministic
execution_mode: follow_trade
follow_trade_supported: true

schedule:
  cron: "*/15 * * * *"
  tz: "Asia/Shanghai"

strategy_config:
  trading_symbols: ["BTCUSDT"]
  bar_interval: "15m"
  swing_lookback: 6
  sweep_buffer_pct: 0.0008
  ob_search_bars: 6
  rr_ratio: 2.5
  max_bars_after_sweep: 6
  atr_period: 14
  min_atr_pct: 0.0018
  max_atr_pct: 0.0
  leverage: 3
  margin_budget: "100"
  trade_size: "0.01"
  force_probe_trade: false

user_config_schema:
  trading_symbols:
    type: array
    item_type: string
    default: ["BTCUSDT"]
    options: ["BTCUSDT", "ETHUSDT", "SOLUSDT", "XAUUSDT"]
    aliases:
      btc: BTCUSDT
      bitcoin: BTCUSDT
      eth: ETHUSDT
      sol: SOLUSDT
      gold: XAUUSDT
      xau: XAUUSDT
    min_items: 1
    max_items: 1
    label: "Trading symbol"
  leverage:
    type: integer
    default: 3
    min: 1
    max: 20
    label: "Leverage"
  margin_budget:
    type: string
    default: "100"
    pattern: "^[0-9]+(\\.[0-9]+)?$"
    label: "Margin budget USDT"
  rr_ratio:
    type: number
    default: 2.5
    min: 1.0
    max: 4.0
    label: "Reward to risk multiple"
  min_atr_pct:
    type: number
    default: 0.0018
    min: 0.0005
    max: 0.005
    label: "Minimum volatility to trade"
  swing_lookback:
    type: integer
    default: 6
    min: 3
    max: 12
    label: "Swing structure lookback"
  force_probe_trade:
    type: boolean
    default: false
    label: "Probe trade (keep false for real SMC only)"